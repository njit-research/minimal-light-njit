<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <title>{{ page.title }} | {{ site.title }} | {{ site.affiliation }}</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ site.title }}">
    <meta name="keywords" content="{{ site.keywords }}">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ site.title }} | {{ site.affiliation }}">
    <meta property="og:url" content="{{ site.canonical }}{{ page.permalink }}">
    <meta property="og:site_name" content="{{ site.title }} | {{ site.affiliation }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:locale" content="default">
    <meta property="og:image" content="{{ site.avatar }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ site.title }} | {{ site.affiliation }}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ site.avatar }}">

    <link rel="canonical" href="{{ site.canonical }}{{ page.permalink }}"/>
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.8.6/css/academicons.min.css" integrity="sha256-uFVgMKfistnJAfoCUQigIl+JfUaP47GrRKjf6CTPVmw=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/pub.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/nav.css' | relative_url }}">

    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    
    <script src="../assets/js/github-stars.js"></script>
    <script type="text/javascript" src="../assets/js/jquery.js"></script>
    <script src="{{ '/assets/js/favicon-switcher.js' | relative_url }}" type="application/javascript"></script>

    <script type="text/javascript">
      function toggle_vis(id) {
          var e = document.getElementById(id);
          if (e.style.display == 'none')
              e.style.display = 'inline';
          else
              e.style.display = 'none';
      }
    </script>

    <script>
      function myFunction() {
        var x = document.getElementById("myLinks");
        var icon = document.querySelector('.topnav a.icon');
        var expanded = icon.getAttribute('aria-expanded') === 'true';
        
        x.classList.toggle('open');
        icon.classList.toggle('active');
        icon.setAttribute('aria-expanded', !expanded);
      }
    </script>

    <style>
      .skip-link {
        position: absolute;
        top: -100px;
        left: 0;
        background: #13294B;
        color: white !important;
        padding: 10px 20px;
        z-index: 9999;
        font-weight: bold;
        text-decoration: none;
        transition: top 0.2s ease;
      }
      .skip-link:focus {
        top: 0;
        outline: 3px solid #0066aa;
      }
      /* Ensure single-column templates occupy full width fluidly */
      .simple-layout-override {
        width: 100% !important;
        padding-left: 20px;
        padding-right: 20px;
      }
    </style>
  </head>
  <body>

    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <nav class="topnav" role="navigation" aria-label="Main Navigation">
      <a href="{{ site.affiliation_link }}" aria-label="Go to {{ site.affiliation }} Website">
        <img width="120" src="{{ '/assets/img/Logo_NJIT.png' | relative_url }}" alt="{{ site.affiliation }} Logo">
      </a>

      <div id="myLinks" role="region" aria-label="Menu Links">
        {% include navigation.md %}
      </div>

      <a href="javascript:void(0);" class="icon" onclick="myFunction()" role="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="myLinks">
        <span class="icon-wrap">
          <i class="fa fa-bars icon-bars" aria-hidden="true"></i>
          <i class="fa fa-xmark icon-xmark" aria-hidden="true"></i>
        </span>
      </a>
    </nav>
    
    <script src="{{ '/assets/js/vanilla-back-to-top.min.js' | relative_url }}"></script>
    <aside aria-label="Back to top tool">
      <button 
        id="back-to-top" 
        type="button" 
        aria-label="Scroll back to the top of the page"
        onclick="window.scrollTo({top: 0, behavior: 'smooth'});"
        style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99; border: 1px solid #ccc; background-color: #fff; color: #333; font-size: 15px; width: 100px; text-align: center; line-height: 30px; height: 30px; cursor: pointer;">
        Back to Top
      </button>
    </aside>

    <script type="text/javascript">
      window.onscroll = function() {
        var btn = document.getElementById("back-to-top");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
          btn.style.display = "block";
        } else {
          btn.style.display = "none";
        }
      };
    </script>
    <style>
        #back-to-top {
          border: 1px solid #ccc;
          border-radius: 0;
          font-size: 15px;
          width: 100px;
          text-align: center;
          line-height: 30px;
          height: 30px;
        }
    </style>
    
    <div class="wrapper">
      <!-- Changed from <section> to semantic <main> region -->
      <main id="main-content" role="main" class="simple-layout-override">

        {{ content }}

        <br>

        {% if site.enable_last_update %}
        <div style="margin-top: 20px;">
          <small>Last Update: 
            <time id="last-modified-date"></time>
            <script>
              const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
              var modiDate = new Date(document.lastModified);
              var showAs = modiDate.getDate() + ". " + monthNames[modiDate.getMonth()] + " " + modiDate.getFullYear();
              document.getElementById("last-modified-date").textContent = showAs;
              document.getElementById("last-modified-date").setAttribute("datetime", modiDate.toISOString().split('T')[0]);
            </script>
          </small> 
        </div>
        {% endif %}
      </main>

      <footer role="contentinfo">
        <div style="font: 18px/1.5 Crimson Pro, serif">
          <p>
            <small>
              {% if site.enable_footnote %}
              {% include_relative _includes/footer.md %}
              {% endif %}
            </small>
          </p>
        </div>
      </footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
