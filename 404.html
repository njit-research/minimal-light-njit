<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <title>404 Not Found | {{ site.title }}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark | relative_url }}" type="image/png" />
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon | relative_url }}" type="image/png" />
    <script src="{{ '/assets/js/favicon-switcher.js' | relative_url }}" type="application/javascript"></script>

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>

    <div class="wrapper">
      <header style="text-align: center; margin-top: 40px;">
        <h1 style="font-size: 2.5rem; color: #13294B; margin-bottom: 10px;">404 Not Found</h1>
      </header>

      <main id="main-content" role="main" style="text-align: center; max-width: 600px; margin: 0 auto; padding: 20px;">
        <p style="font-size: 1.25rem; line-height: 1.6; margin-bottom: 20px;">
          This is not the web page you are looking for.
        </p>
        
        <p style="font-size: 1.1rem; color: #57606a; margin-bottom: 30px;">
          You will be redirected to the homepage in 5 seconds.
        </p>

        <a href="{{ '/' | relative_url }}" class="btn" style="display: inline-block; background-color: #13294B; color: #ffffff !important; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold;">
          Return to Homepage Immediately
        </a>
      </main>
    </div>

    <script type="text/javascript">
      window.setTimeout(function() {
        window.location.href = "{{ '/' | relative_url }}";
      }, 5000);
    </script>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
